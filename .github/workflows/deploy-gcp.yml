name: Deploy → Google Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'supermarket_sales.csv'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/meu-app:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/meu-app:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy meu-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/meu-app:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --port 8080 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
